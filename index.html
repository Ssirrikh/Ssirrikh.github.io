<!DOCTYPE html>
<html>
<head>
	<meta charset = 'utf-8'>
	<title>Kat's Landing</title>
	<style>
		:root {
			--text-light: #c1c2c5;
			--text-light-subtitle: #51525f;
			--bg-dark: #222;
			--font-medium: 1em;
			--font-large: 1.5em;

			--fluid-font-size: max(2.5vh, calc(1rem + 0.3vw));
			--widget-border-radius: calc(0.5 * var(--fluid-font-size));
			--width-picker: 20em;
			--height-picker: 15em;
			--width-inputs: 10em;

			--bg-gradient: linear-gradient(
				0deg,
				rgba(110, 12, 145, 1) 0%, rgba(40, 56, 144, 1) 25%, rgba(29, 24, 82, 1) 49%,
				rgba(255, 255, 255, 1) 50%,
				rgba(110, 12, 145, 1) 51%, rgba(238, 89, 155, 1) 80%, rgba(248, 203, 223, 1) 100%
			);
		}

		* {
			padding: 0;
			margin: 0;
			box-sizing: border-box;
			font-family: Arial, Helvetica, sans-serif;
		}
		body {
			/* background-color: #1a1529; */
			/* background: var(--bg-gradient); */
			background-image: linear-gradient(red, yellow);
			font-size: var(--fluid-font-size);
		}
		div {
			display: block;
		}
		button {
			border: none;
			font-size: 1em;
		}
		input {
			/* remove default formatting */
			border: none;
			outline: none;
		}
		h1, h2 {
			font-size: 1em;
			font-weight: normal;
		}



		/* ******************************* */

		/**** FLEXBOX UTILS ****/

		.flex-sep {
			width: 0;
			flex-grow: 1;
		}
		.flex-row {
			display: flex;
			flex-direction: row !important;
			align-items: start;
		}
		.flex-col {
			display: flex;
			flex-direction: column !important;
		}
		.flex-adapt {
			/* column on mobile, row on desktop */
			display: flex;
			flex-direction: column !important;
			align-items: center;
		}
		.flex-adapt-reverse {
			/* row on mobile, column on desktop */
			display: flex;
			flex-direction: row !important;
			align-items: normal;
			justify-content: center;
		}
		.flex-centered {
			align-items: center;
			justify-content: center;
		}

		/**** SCREENREADER UTILS ****/

		.sr-only {
			border: 0;
			clip: rect(0,0,0,0);
			overflow: hidden;

			position: absolute;
			width: 1px;
			height: 1px;
			margin: -1px;
			white-space: nowrap;
		}



		/* ******************************* */

		#bg-bot {
			background: linear-gradient(rgba(29, 24, 82, 1), rgba(40, 56, 144, 1), rgba(110, 12, 145, 1));
			position: fixed;
			top: 0;
			left: 0;
			width: 100vw;
			height: 100vh;
		}

		#developer-name {
			color: var(--text-light);
			background-color: var(--bg-dark);
			border: 1px solid var(--text-light-subtitle);
			border-radius: 0.5em;

			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%,-50%);

			padding: 0.5em 1em;
		}

		#tagline-top, #tagline-bot {
			color: var(--text-light);
			font-size: 2em;
			position: absolute;
			transform: translate(-50%,-50%);
			text-wrap: nowrap;
		}
		#tagline-top {
			top: 25vh;
			left: 25vw;
		}
		#tagline-bot {
			top: 75vh;
			left: 75vw;
		}

		

	</style>
</head>
<body>

	<div id='bg-bot'></div>

	<h1 id='developer-name'>Narayana "Kat" Adisasmito-Smith</h1>
	<h2 id='tagline-top'>Web developer by day.</h2>
	<h2 id='tagline-bot'>Technical artist by night.</h2>

</body>
</html>
