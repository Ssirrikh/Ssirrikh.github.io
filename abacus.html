<script type='text/javascript'>
    const UNIT_ABBRS = ['','k','m','b','t'];
    const nearestPower = (n) => Math.ceil(Math.log10(n));

	class SuanpanRow {
        // 5+2 Suanpan abacus row
        constructor () {
            this.upper = 0; // int [0,2]
            this.lower = 0; // int [0,5]
        }
        set value (n) {
            return this.set(n);
        }
        get value () {
            return 5*this.upper + this.lower;
        }
        reset () {
            this.upper = 0;
            this.lower = 0;
        }
        set (n) {
            const rem = Math.trunc(n / 10);
            const cur = parseInt(n % 10);
            this.upper = Math.trunc(cur / 5);
            this.lower = cur % 5;
            // console.log(`${cur} -> ${this.upper} upper, ${this.lower} lower + ${rem}`);
            return rem; // number of 10-beads to carry
        }
        add (n) {
            const old = this.value;

            const rem = Math.trunc(n / 10);
            const cur = n % 10;
            const total = this.value + cur;
            const carry = this.set(cur);
            console.log(`row ${old}, add ${n} -> row ${this.value}, carry ${carry} + remainder ${rem}`);
            return rem;
        }
    }

    class SorobanRow {
        // 4+1 Soroban Abacus row
        constructor () {
            this._value = 0;
        }
        get upper () { return Math.trunc(this._value / 5); }
        get lower () { return this._value % 5; }
        get value () { return this._value; }
        reset () {
            this._value = 0;
            return 0;
        }
        set (n) {
            this._value = n % 10;
            return Math.trunc(n / 10);
        }
        add (n) {
            n += this._value;
            this._value = n % 10;
            return Math.trunc(n / 10);
        }
    }
    class SorobanAbacus {
        constructor (numRows = 13) {
            this.rows = [];
            for (let i = 0; i < numRows; i++) {
                this.rows.push( new SorobanRow() );
            }
        }
        get value () {
            let total = 0;
            for (let i = 0; i < this.rows.length; i++) {
                total += Math.pow(10,i) * this.rows[i].value;
            }
            return total;
        }
        prettyPrint () {
            for (let i = this.rows.length-1; i >= 0; i--) {
                const labelLower = (i <= 3) ? `${1*Math.pow(10,i)}` : `10^${i}`;
                const labelUpper = (i <= 3) ? `${5*Math.pow(10,i)}` : `5 * 10^${i}`;
                console.log(`(${labelLower}) ${this.rows[i].lower}|${this.rows[i].upper} (${labelUpper})`);
            }
            console.log(`Total is ${this.value}`);
        }
        reset () {
            for (let row of this.rows) {
                row.reset();
            }
        }
        set (n) {
            this.reset();
            // this.add(n);
            for (let i = 0; i < this.rows.length; i++) {
                const remainder = this.rows[i].add(n);
                n = remainder;
            }
        }
    }

    }
